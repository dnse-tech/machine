# Hardened s390x + multi-arch release for dnse-tech/machine (rancher-machine).
# Invariants: workflow_dispatch-only (no release: double-fire); no GitHub Release job; upstream legs
# digest-pinned dynamically (amd64/arm64 resolved at runtime, combined by digest). Builds the s390x
# binary, packages the linux/s390x container, then combines upstream amd64/arm64 + our s390x → :<tag>.
# The done-gate is the ghcr container manifest (verify-manifest), not a release asset.
# Reference copy in rancher-mirror/templates/rancher-app/; authoritative copy on the fork's default
# branch (master) as .github/workflows/release-s390x.yaml.
name: Release s390x

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.15.0-rancher143)"
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dnse-tech/machine
  UPSTREAM_IMAGE: rancher/machine

jobs:
  build-s390x:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ inputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build s390x binary
        run: |
          echo "GOOS=linux" >> "$GITHUB_ENV"
          echo "GOARCH=s390x" >> "$GITHUB_ENV"
          echo "ARCH=s390x" >> "$GITHUB_ENV"
          ./scripts/clean
          ./scripts/build

      - name: Package s390x artifact
        run: ./scripts/package

      - name: Build and push s390x Docker image
        uses: docker/build-push-action@v6
        with:
          context: .                          # repo root — package/Dockerfile uses root-relative COPYs
          file: package/Dockerfile
          push: true
          platforms: linux/s390x
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.tag }}-s390x

  create-manifest:
    runs-on: ubuntu-latest
    needs: build-s390x
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve upstream leg digests (H2 supply-chain pin)
        id: legs
        run: |
          set -euo pipefail
          TAG="${{ needs.build-s390x.outputs.tag }}"
          UPSTREAM="${{ env.UPSTREAM_IMAGE }}:${TAG}"
          RAW="$(docker buildx imagetools inspect --raw "$UPSTREAM")" \
            || { echo "::error::upstream $UPSTREAM not found"; exit 1; }
          AMD64="$(printf '%s' "$RAW" | jq -r '.manifests[]?|select(.platform.os=="linux" and .platform.architecture=="amd64").digest' | head -1)"
          ARM64="$(printf '%s' "$RAW" | jq -r '.manifests[]?|select(.platform.os=="linux" and .platform.architecture=="arm64").digest' | head -1)"
          [ -n "$AMD64" ] && [ -n "$ARM64" ] || { echo "::error::upstream missing amd64/arm64 (amd64=$AMD64 arm64=$ARM64)"; exit 1; }
          echo "amd64=$AMD64" >> "$GITHUB_OUTPUT"
          echo "arm64=$ARM64" >> "$GITHUB_OUTPUT"
          echo "upstream legs: amd64=$AMD64 arm64=$ARM64"

      - name: Create and push digest-pinned multi-arch manifest
        run: |
          set -euo pipefail
          TAG="${{ needs.build-s390x.outputs.tag }}"
          UPSTREAM="${{ env.UPSTREAM_IMAGE }}"
          TARGET="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker buildx imagetools create -t "${TARGET}:${TAG}" \
            "${TARGET}:${TAG}-s390x" \
            "${UPSTREAM}@${{ steps.legs.outputs.amd64 }}" \
            "${UPSTREAM}@${{ steps.legs.outputs.arm64 }}"
          echo "Pushed multi-arch: ${TARGET}:${TAG}"

      - name: Inspect manifest
        run: |
          set -euo pipefail
          TAG="${{ needs.build-s390x.outputs.tag }}"
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG
